<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="minesweeper.js" type="module"></script>
</head>
<body>
    <div id="game-display">
        <div id="about-game">
            <h3><b>Stressful</b> minesweeper</h3>
            <p id="status-text"></p>
        </div>
        <div id="heading">
            <select id="difficulty"></select>
            <div id="score"></div>
            <div id="timer"></div>
            <button id="new-game">New Game</button>
        </div>
        <div id="game-board">
        </div>
    </div>
</body>
</html>
